naftiko: "1.0.0-alpha1"

info:
  label: "Red Hat 3scale Account Management API"
  description: "Manages developer accounts, applications, application plans, and subscriptions in the 3scale admin portal."
  tags:
    - Account Management
    - API Management
    - Developer Portal
    - Red Hat
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      THREESCALE_ACCESS_TOKEN: THREESCALE_ACCESS_TOKEN
      THREESCALE_ADMIN_DOMAIN: THREESCALE_ADMIN_DOMAIN

capability:
  consumes:
    - type: http
      namespace: threescale-account-mgmt
      baseUri: "https://{{THREESCALE_ADMIN_DOMAIN}}-admin.3scale.net/admin/api"
      description: "3scale Account Management API for developer lifecycle operations"
      authentication:
        type: apikey
        key: access_token
        value: "{{THREESCALE_ACCESS_TOKEN}}"
        placement: query
      resources:
        - name: accounts
          path: /accounts.json
          description: "Developer account management"
          operations:
            - name: list-accounts
              method: GET
              description: "List all developer accounts"
              inputParameters:
                - name: state
                  in: query
                  type: string
                  required: false
                  description: "Filter by account state (approved, pending, rejected)"
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
                - name: per_page
                  in: query
                  type: integer
                  required: false
                  description: "Results per page"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-account
              method: POST
              description: "Create a new developer account"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: form
                data:
                  org_name: "{{tools.org_name}}"
                  username: "{{tools.username}}"
                  email: "{{tools.email}}"
                  password: "{{tools.password}}"
        - name: account-detail
          path: /accounts/{id}.json
          description: "Individual account management"
          operations:
            - name: get-account
              method: GET
              description: "Get developer account details"
              inputParameters:
                - name: id
                  in: path
                  type: integer
                  required: true
                  description: "Account ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-account
              method: DELETE
              description: "Delete a developer account"
              inputParameters:
                - name: id
                  in: path
                  type: integer
                  required: true
                  description: "Account ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: applications
          path: /accounts/{account_id}/applications.json
          description: "Application management for a developer account"
          operations:
            - name: list-applications
              method: GET
              description: "List applications for an account"
              inputParameters:
                - name: account_id
                  in: path
                  type: integer
                  required: true
                  description: "Developer account ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-application
              method: POST
              description: "Create a new application subscription"
              inputParameters:
                - name: account_id
                  in: path
                  type: integer
                  required: true
                  description: "Developer account ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: form
                data:
                  plan_id: "{{tools.plan_id}}"
                  name: "{{tools.app_name}}"

  exposes:
    - type: rest
      port: 8101
      namespace: threescale-account-mgmt-rest
      resources:
        - path: /v1/accounts
          name: accounts
          description: "Developer account management"
          operations:
            - method: GET
              name: list-accounts
              description: "List developer accounts"
              call: "threescale-account-mgmt.list-accounts"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-account
              description: "Create a developer account"
              call: "threescale-account-mgmt.create-account"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/accounts/{id}
          name: account
          description: "Individual account access"
          operations:
            - method: GET
              name: get-account
              description: "Get account details"
              call: "threescale-account-mgmt.get-account"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: threescale-account-mgmt-mcp
      transport: http
      tools:
        - name: list-developer-accounts
          description: "List developer accounts registered in 3scale"
          hints:
            readOnly: true
            openWorld: true
          call: "threescale-account-mgmt.list-accounts"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-developer-account
          description: "Create a new developer account in 3scale"
          hints:
            readOnly: false
            openWorld: false
          call: "threescale-account-mgmt.create-account"
          with:
            org_name: "tools.org_name"
            username: "tools.username"
            email: "tools.email"
            password: "tools.password"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-account-applications
          description: "List applications subscribed by a developer account"
          hints:
            readOnly: true
            openWorld: true
          call: "threescale-account-mgmt.list-applications"
          with:
            account_id: "tools.account_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-application
          description: "Subscribe a developer account to an API application plan"
          hints:
            readOnly: false
            openWorld: false
          call: "threescale-account-mgmt.create-application"
          with:
            account_id: "tools.account_id"
            plan_id: "tools.plan_id"
            app_name: "tools.app_name"
          outputParameters:
            - type: object
              mapping: "$."
